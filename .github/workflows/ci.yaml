name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    strategy:
      fail-fast: false
      matrix:
        python: ['3.12', '3.13']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}

      - run: uv sync --group dev

      - run: uv run ruff check

      - run: uv run ruff format --check

  check-version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      should-publish: ${{ steps.version.outputs.local_version_is_higher }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if version needs publishing
        id: version
        uses: maybe-hello-world/pyproject-check-version@cbb988d0ddc5eb18f243b2fd088be84e0c42d053
        with:
          pyproject-path: pyproject.toml

  publish:
    needs: [lint, check-version]
    if: needs.check-version.outputs.should-publish == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Build
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
